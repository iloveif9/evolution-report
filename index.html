<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 大麦龙虾进化日报</title>

<!-- Google Fonts preconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   APPLE STYLE DESIGN SYSTEM
   Version: v1.0 · Apple Vibrant Palette
   ═══════════════════════════════════════════ */

/* ── 1. CSS Variables ── */
:root {
  /* Apple Vibrant Palette */
  --purple:  #8E5AFF;
  --blue:    #0A84FF;
  --pink:    #FF6B8A;
  --orange:  #FF9F0A;
  --cyan:    #64D2FF;
  --green:   #30D158;

  /* Surfaces */
  --bg:        #000000;
  --surface:   rgba(255,255,255,0.05);
  --glass-bg:  rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.12);
  --border-hi: rgba(255,255,255,0.22);

  /* Text */
  --text:      #ffffff;
  --text-dim:  rgba(255,255,255,0.55);
  --text-muted:rgba(255,255,255,0.30);

  /* Blur */
  --blur:      20px;
  --blur-sm:   10px;

  /* Easing */
  --ease:      cubic-bezier(0.22, 1, 0.36, 1);
}

/* ── 2. Global Reset ── */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Sans SC', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 3. Blob Canvas (Fixed background blobs) ── */
.blob-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.6;
  animation: float 20s ease-in-out infinite;
  overflow: hidden;
}

.blob-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #5AC8FA 0%, transparent 70%);
  top: -200px; left: -150px;
  animation-delay: 0s;
}
.blob-2 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #64D2FF 0%, transparent 70%);
  top: 30%; right: -150px;
  animation-delay: -5s;
}
.blob-3 {
  width: 450px; height: 450px;
  background: radial-gradient(circle, #0A84FF 0%, transparent 70%);
  bottom: -100px; left: 20%;
  animation-delay: -10s;
}
.blob-4 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, #5AC8FA 0%, transparent 70%);
  bottom: 20%; right: 10%;
  animation-delay: -15s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25%       { transform: translate(40px, -30px) scale(1.05); }
  50%       { transform: translate(-20px, 20px) scale(0.95); }
  75%       { transform: translate(30px, 40px) scale(1.02); }
}

/* ── 4. Neural Particle Canvas ── */
#neuralCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.4;
}

/* ── 5. Container ── */
.container {
  position: relative;
  z-index: 10;
  max-width: 880px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── 6. Hero ── */
.hero {
  padding: 80px 0 60px;
  text-align: center;
}

.hero-eyebrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
  animation: fadeUp 0.7s var(--ease) both;
}

.hero-date {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: var(--text-dim);
}

.hero-sep {
  font-size: 13px;
  color: var(--text-muted);
}

.hero-weekday {
  font-size: 13px;
  color: var(--text-muted);
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--blur-sm));
  -webkit-backdrop-filter: blur(var(--blur-sm));
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 100px;
  animation: fadeUp 0.7s var(--ease) 0.05s both;
}

.hero-title {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 16px;
  animation: fadeUp 0.7s var(--ease) 0.1s both;
}

.hero-title .accent {
  background: linear-gradient(135deg, #0A84FF, #64D2FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 0.3px;
  animation: fadeUp 0.7s var(--ease) 0.15s both;
}

/* ── 7. Rainbow Divider ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(10,132,255,0.6) 15%,
    rgba(90,200,250,0.6) 40%,
    rgba(48,209,88,0.5) 70%,
    transparent 100%
  );
  border: none;
  margin: 0 0 52px;
}

/* ── 8. Section Label ── */
.section-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 9. Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 48px;
}

@media (max-width: 640px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}

.stat-card {
  position: relative;
  overflow: hidden;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px 18px;
  text-align: center;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  animation: fadeUp 0.5s var(--ease) both;
}

.stat-card:nth-child(1) { animation-delay: 0.05s; }
.stat-card:nth-child(2) { animation-delay: 0.10s; }
.stat-card:nth-child(3) { animation-delay: 0.15s; }
.stat-card:nth-child(4) { animation-delay: 0.20s; }

.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Hover glow overlay */
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

.stat-card:hover::before { opacity: 1; }

.stat-card.purple::before {
  background: radial-gradient(circle at top left, rgba(90,200,250,0.25), transparent 60%);
}
.stat-card.blue::before {
  background: radial-gradient(circle at top left, rgba(10,132,255,0.25), transparent 60%);
}
.stat-card.pink::before {
  background: radial-gradient(circle at top left, rgba(100,210,255,0.25), transparent 60%);
}
.stat-card.orange::before {
  background: radial-gradient(circle at top left, rgba(255,159,10,0.25), transparent 60%);
}

.stat-icon {
  font-size: 22px;
  margin-bottom: 10px;
}

.stat-num {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-card.purple .stat-num { color: var(--purple); }
.stat-card.blue   .stat-num { color: var(--blue); }
.stat-card.pink   .stat-num { color: var(--pink); }
.stat-card.orange .stat-num { color: var(--orange); }

.stat-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.stat-sub {
  font-size: 11px;
  color: var(--text-muted);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── 10. Glass Card ── */
.glass {
  position: relative;
  z-index: 1;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}

.glass:hover {
  border-color: var(--border-hi);
  transform: translateY(-2px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* ── 11. Report Grid ── */
.report-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 48px;
}

.report-card {
  display: block;
  text-decoration: none;
  color: var(--text);
  background: var(--glass-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  animation: fadeUp 0.6s var(--ease) both;
  overflow: hidden;
}

.report-card:hover {
  border-color: var(--border-hi);
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}

.report-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
  opacity: 0;
  transition: opacity 0.3s;
}

.report-card:hover::before { opacity: 1; }

.report-card .card-date { color: var(--blue); } /* kept separately below */
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--purple);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}

.report-card .card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.report-card .card-summary {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 16px;
}

.report-card .card-stats {
  display: flex;
  gap: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}

.report-card .card-stat {
  font-size: 11px;
  color: var(--text-muted);
}

.report-card .card-stat strong {
  font-weight: 700;
  color: var(--cyan);
}

/* ── 12. Content Grid ── */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 48px;
}

.col-full { grid-column: 1 / -1; }

@media (max-width: 640px) {
  .content-grid { grid-template-columns: 1fr; }
}

/* ── 13. Card Title Icon ── */
.card-title-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.card-title-icon.purple { background: rgba(90,200,250,0.20); }
.card-title-icon.blue   { background: rgba(10,132,255,0.20); }
.card-title-icon.pink   { background: rgba(100,210,255,0.20); }
.card-title-icon.orange { background: rgba(255,159,10,0.20); }
.card-title-icon.green  { background: rgba(48,209,88,0.20); }
.card-title-icon.cyan   { background: rgba(100,210,255,0.20); }

/* ── 14. Skill Tag ── */
.skill-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(10,132,255,0.12);
  border: 1px solid rgba(10,132,255,0.25);
  color: var(--cyan);
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 8px;
  cursor: default;
  transition: all 0.2s;
}

.skill-tag.purple { background: rgba(90,200,250,0.12); border-color: rgba(90,200,250,0.25); color: var(--purple); }
.skill-tag.orange { background: rgba(255,159,10,0.12); border-color: rgba(255,159,10,0.25); color: var(--orange); }
.skill-tag.pink   { background: rgba(100,210,255,0.12);  border-color: rgba(100,210,255,0.25);  color: var(--pink); }
.skill-tag.green  { background: rgba(48,209,88,0.12);  border-color: rgba(48,209,88,0.25);  color: var(--green); }

.skill-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

/* ── 15. Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  backdrop-filter: blur(var(--blur-sm));
  -webkit-backdrop-filter: blur(var(--blur-sm));
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 100px;
  flex-wrap: wrap;
  gap: 8px;
  transition: all 0.2s;
}

.badge:hover {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}

/* ── 16. Work Item ── */
.work-item {
  display: flex;
  gap: 14px;
  padding: 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  transition: all 0.2s;
  animation: slideIn 0.4s var(--ease) both;
}

.work-item:hover {
  background: rgba(255,255,255,0.07);
  border-color: var(--border-hi);
  transform: translateX(4px);
}

.work-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.work-icon.purple { background: rgba(90,200,250,0.20); }
.work-icon.blue   { background: rgba(10,132,255,0.20); }
.work-icon.pink   { background: rgba(100,210,255,0.20); }
.work-icon.orange { background: rgba(255,159,10,0.20); }
.work-icon.green  { background: rgba(48,209,88,0.20); }
.work-icon.cyan   { background: rgba(100,210,255,0.20); }

.work-content { flex: 1; min-width: 0; }

.work-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.work-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── 17. Bug Card ── */
.bug-card {
  padding: 16px;
  background: rgba(100,210,255,0.05);
  border: 1px solid rgba(100,210,255,0.15);
  border-radius: 14px;
  animation: fadeUp 0.4s var(--ease) both;
}

.bug-label {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--pink);
  background: rgba(100,210,255,0.15);
  padding: 3px 8px;
  border-radius: 5px;
  display: inline-block;
  margin-bottom: 10px;
  text-shadow: 0 0 8px rgba(255,55,95,0.5);
}

.bug-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
}

.bug-fix {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.7;
  padding-left: 14px;
  border-left: 2px solid rgba(100,210,255,0.25);
}

.bug-fix code {
  background: rgba(255,255,255,0.08);
  padding: 1px 6px;
  border-radius: 5px;
  font-family: 'Inter', monospace;
  font-size: 11px;
  color: var(--cyan);
}

/* ── 18. Learning Pill ── */
.learning-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 48px;
}

@media (max-width: 640px) {
  .learning-grid { grid-template-columns: 1fr; }
}

.learning-pill {
  padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  transition: all 0.2s;
}

.learning-pill:nth-child(odd)  { animation-delay: 0.05s; }
.learning-pill:nth-child(even) { animation-delay: 0.10s; }

.learning-pill:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-hi);
  color: var(--text);
}

.learning-num {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 800;
  color: var(--purple);
  margin-right: 6px;
  letter-spacing: 0.5px;
}

/* ── 19. Rule Grid ── */
.rule-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 48px;
}

.rule-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 15px;
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
  transition: all 0.2s;
}

.rule-item:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--border-hi);
  color: var(--text);
}

.rule-num {
  font-family: 'Inter', sans-serif;
  font-size: 9px;
  font-weight: 800;
  color: var(--purple);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 5px;
}

/* ── 20. Breadcrumb ── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 32px;
  animation: fadeUp 0.6s var(--ease) both;
}

.breadcrumb a {
  color: var(--cyan);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid rgba(100,210,255,0.25);
  border-radius: 6px;
  transition: background 0.2s, border-color 0.2s;
}

.breadcrumb a:hover {
  background: rgba(100,210,255,0.1);
  border-color: var(--cyan);
  text-decoration: none;
}

/* ── 21. Detail Header ── */
.detail-header {
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.detail-title {
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  animation: fadeUp 0.7s var(--ease) both;
}

.detail-meta {
  display: flex;
  gap: 20px;
  font-size: 13px;
  color: var(--text-dim);
  flex-wrap: wrap;
  animation: fadeUp 0.7s var(--ease) 0.1s both;
}

.detail-meta span {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ── 22. Section ── */
.section {
  margin-bottom: 48px;
  animation: fadeUp 0.7s var(--ease) both;
}

/* ── 23. Evo Item ── */
.evo-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  transition: all 0.2s;
}

.evo-item:hover {
  background: rgba(255,255,255,0.07);
  border-color: var(--border-hi);
  transform: translateX(4px);
}

.evo-item h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.evo-item p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.8;
}

/* ── 24. Footer ── */
.footer {
  padding: 56px 0 0;
  text-align: center;
  position: relative;
}

.footer::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 0%,
    rgba(191,90,242,0.4) 25%,
    rgba(10,132,255,0.4) 50%,
    rgba(255,55,95,0.4) 75%,
    transparent 100%
  );
  margin-bottom: 32px;
}

.footer p {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 2px;

<!-- Background Blobs -->

<canvas id="neuralCanvas"></canvas>

<script>
/* ═══════════════════════════════════════════
   NEURAL NETWORK PARTICLE SYSTEM
   Apple Palette: Purple / Blue / Pink / Orange / Cyan / Green
   ═══════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('neuralCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];
  let animRunning = true;

  const CFG = {
    count: 40,
    connectDist: 130,
    speed: 0.35,
    drift: 0.12,
    attractCX: 0.5,
    nodeR: 2,
    lineAlpha: 0.05
  };

  const colors = ['#5AC8FA','#0A84FF','#64D2FF','#30D158','#FF9F0A','#5AC8FA'];

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w;
      this.y = Math.random() * h;
      this.vx = (Math.random() - 0.5) * CFG.speed;
      this.vy = (Math.random() - 0.5) * CFG.speed;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.alpha = 0.3 + Math.random() * 0.5;
      this.phase = Math.random() * Math.PI * 2;
      this.flicker = 0.9 + Math.random() * 0.1;
    }
    update(t) {
      const cx = w * CFG.attractCX;
      const cy = h * 0.35;
      const dx = cx - this.x;
      const dy = cy - this.y;
      const distC = Math.sqrt(dx * dx + dy * dy) + 1;
      this.ax = (dx / distC) * 0.012 + (Math.random() - 0.5) * CFG.drift * 0.1;
      this.ay = (dy / distC) * 0.012 + (Math.random() - 0.5) * CFG.drift * 0.1;
      this.vx = (this.vx + this.ax) * 0.96;
      this.vy = (this.vy + this.ay) * 0.96;
      const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
      if (spd > CFG.speed) {
        this.vx = (this.vx / spd) * CFG.speed;
        this.vy = (this.vy / spd) * CFG.speed;
      }
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0) this.x = w;
      if (this.x > w) this.x = 0;
      if (this.y < 0) this.y = h;
      if (this.y > h) this.y = 0;
      this.flicker = 0.88 + Math.sin(t * 0.001 + this.phase) * 0.12;
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.alpha * this.flicker;
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, CFG.nodeR, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawConn() {
    ctx.save();
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < CFG.connectDist) {
          const t = 1 - d / CFG.connectDist;
          ctx.globalAlpha = CFG.lineAlpha * t * 2.5 * particles[i].flicker;
          ctx.strokeStyle = particles[i].color;
          ctx.lineWidth = t * 1.2;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    particles = [];
    for (let i = 0; i < CFG.count; i++) particles.push(new Particle());
  }

  function loop(t) {
    if (!animRunning) return;
    ctx.clearRect(0, 0, w, h);
    drawConn();
    for (const p of particles) { p.update(t); p.draw(); }
    requestAnimationFrame(loop);
  }

  document.addEventListener('visibilitychange', () => {
    animRunning = !document.hidden;
    if (animRunning) requestAnimationFrame(loop);
  });

  window.addEventListener('resize', resize);

  init();
  requestAnimationFrame(loop);
})();
