<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 大麦龙虾进化日报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #050810;
    --surface: #0c1220;
    --border: #1a2a45;
    --accent: #00E5CC;
    --accent-dim: #00E5CC33;
    --text: #E0E8F5;
    --text-dim: #6B7FA3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; min-height: 100vh; }

  .container { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

  .header { text-align: center; padding: 60px 0 50px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
  .header-emoji { font-size: 48px; margin-bottom: 16px; }
  .header-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 32px; color: #fff; margin-bottom: 8px; }
  .header-title span { color: var(--accent); }
  .header-sub { color: var(--text-dim); font-size: 14px; }

  .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb span { opacity: 0.5; }

  .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }

  .report-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; text-decoration: none; color: var(--text); display: block;
    transition: border-color 0.25s, transform 0.2s; position: relative; overflow: hidden;
  }
  .report-card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .report-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent); opacity: 0; transition: opacity 0.25s;
  }
  .report-card:hover::before { opacity: 1; }
  .card-date { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .card-title { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 8px; line-height: 1.4; }
  .card-summary { font-size: 13px; color: var(--text-dim); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-stats { display: flex; gap: 16px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .card-stat { font-size: 12px; color: var(--text-dim); }
  .card-stat strong { color: var(--accent); }

  .detail-header { margin-bottom: 40px; }
  .detail-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 28px; color: #fff; margin-bottom: 12px; line-height: 1.3; }
  .detail-meta { display: flex; gap: 20px; font-size: 13px; color: var(--text-dim); flex-wrap: wrap; }
  .detail-meta span { display: flex; align-items: center; gap: 5px; }

  .section { margin-bottom: 40px; }
  .section-title { font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  .evo-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .evo-item h4 { font-size: 15px; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .evo-item p { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

  .rule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .rule-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--text); }
  .rule-num { font-size: 10px; color: var(--accent); font-weight: 700; letter-spacing: 1px; display: block; margin-bottom: 3px; }

  .skill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-badge { background: var(--surface); border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .skill-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .skill-badge .dot.inactive { background: var(--text-dim); }

  .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); text-decoration: none; font-size: 14px; padding: 8px 16px; border: 1px solid var(--accent-dim); border-radius: 8px; margin-bottom: 28px; transition: background 0.2s; }
  .back-btn:hover { background: var(--accent-dim); }

  @media (max-width: 600px) {
    .report-grid { grid-template-columns: 1fr; }
    .rule-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ── 报告数据（每期日报在这里登记）─────────────────────────────
const REPORTS = [
  {
    id: '2026-03-31',
    date: '2026-03-31',
    title: '四大Wiki体系 + A↔B深挖 + 进化日报系统上线',
    summary: '通过A↔B对话发现「用户状态感知」和「闭嘴能力」两个盲点；建立四大Wiki文档体系；整理云盘归档6+份文档；上线完整嵌套式进化日报网站并打通GitHub→Vercel自动部署。',
    stats: { rules: 10, compression: '-82%', discoveries: 4, skills: 1 }
  },
  {
    id: '2026-04-01',
    date: '2026-04-01',
    title: '每日进化日报第二期（明天2:15自动生成）',
    summary: '明天的日报将在 2:15 自动生成，请期待…',
    stats: { rules: 10, compression: '-82%', discoveries: 0, skills: 0 }
  }
];

// ── 首页 ─────────────────────────────────────────────────────
function renderHome() {
  document.title = '🦞 大麦龙虾进化日报';
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-emoji">🦞</div>
      <h1 class="header-title">大麦龙虾 <span>进化</span> 日报</h1>
      <div class="header-sub">每天凌晨 2:15 自动生成 · 记录成长的每一步</div>
    </div>
    <div class="report-grid">
      ${REPORTS.map(r => `
        <a href="?id=${r.id}" class="report-card">
          <div class="card-date">${r.date}</div>
          <div class="card-title">${r.title}</div>
          <div class="card-summary">${r.summary}</div>
          <div class="card-stats">
            <div class="card-stat">准则 <strong>${r.stats.rules}</strong> 条</div>
            <div class="card-stat">新发现 <strong>${r.stats.discoveries}</strong> 个</div>
            <div class="card-stat">新技能 <strong>${r.stats.skills}</strong> 个</div>
          </div>
        </a>
      `).join('')}
    </div>
  `;
}

// ── 详情页（加载独立 HTML）───────────────────────────────────
function renderDetail(id) {
  const r = REPORTS.find(x => x.id === id);
  if (!r) { renderHome(); return; }

  document.title = `🦞 ${r.date} 进化日报`;
  document.getElementById('app').innerHTML = `
    <div class="breadcrumb">
      <a href="./">← 所有日报</a>
      <span>/</span>
      <span>${r.date}</span>
    </div>
    <div class="detail-header">
      <h1 class="detail-title">🦞 ${r.title}</h1>
      <div class="detail-meta">
        <span>📅 ${r.date}</span>
        <span>⚡ ${r.stats.discoveries} 个新发现</span>
        <span>🎯 ${r.stats.rules} 条准则</span>
        <span>🎨 ${r.stats.skills} 个新技能</span>
      </div>
    </div>
    <div id="report-content">
      <div style="text-align:center;padding:60px;color:var(--text-dim);">
        正在加载日报内容…
      </div>
    </div>
  `;

  // 加载独立报告页面
  fetch(`reports/${id}.html`)
    .then(res => {
      if (!res.ok) throw new Error('not found');
      return res.text();
    })
    .then(html => {
      document.getElementById('report-content').innerHTML = html;
    })
    .catch(() => {
      document.getElementById('report-content').innerHTML = `
        <div style="text-align:center;padding:60px;color:var(--text-dim);">
          <p>📄 飞书备份：<a href="https://www.feishu.cn/docx/HcMrdjNf7oBphcxYN4Vcy0Opn5c" target="_blank" style="color:var(--accent);">查看历史日报</a></p>
          <p style="margin-top:12px;">日报内容将在 2:15 自动同步至此页面</p>
        </div>
      `;
    });
}

// ── 路由 ─────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (id) {
  renderDetail(id);
} else {
  renderHome();
}
</script>
</body>
</html>
